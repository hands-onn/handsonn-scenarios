apiVersion: labs.handsonn.dev/v1
kind: Scenario
id: debug-microservice
title: Debug a Misbehaving API
summary: A broken API and its database. Find the bug, fix the SQL, verify the response.
difficulty: intermediate
tags: [debugging, http, sql]
duration: 30m
topic: database
issueType: debugging

session:
  ttl: 60m
  quota:
    cpu: "4"
    memory: 8Gi
    pods: 5

environment:
  type: linux
  pods:
    # netshoot ships curl, jq, dig, nc, psql, etc. baked in — our pods
    # run with a tight SecurityContext (caps dropped, no privilege
    # escalation), so we can't `apt-get install` at runtime.
    - name: shell
      image: nicolaka/netshoot:latest
      primary: true
      command: ["sleep", "infinity"]
      resources:
        cpu: "1"
        memory: 1Gi

    # PLACEHOLDER image. The real scenario needs a Go/Node service that
    # exposes /healthz and /orders, intentionally backed by a broken
    # `orders_view` in postgres so step 3 has a SQL bug to fix.
    # http-echo just 200s on every path with the request echoed as JSON —
    # step 1 (healthz reachable) passes, step 2 (/orders returns array)
    # will fail because echo returns an object. Build the real image and
    # swap back in to make this scenario actually testable end-to-end.
    - name: api
      image: mendhak/http-https-echo:34
      expose: [8080]
      command: ["node", "index.js"]
      env:
        - name: HTTP_PORT
          value: "8080"
        - name: DB_HOST
          value: db
        - name: DB_PORT
          value: "5432"
      resources:
        cpu: "500m"
        memory: 512Mi

    - name: db
      image: postgres:15-alpine
      expose: [5432]
      env:
        - name: POSTGRES_PASSWORD
          value: lab
        - name: POSTGRES_DB
          value: orders
      resources:
        cpu: "500m"
        memory: 512Mi

  # No init needed — netshoot ships with curl, jq, psql, dig, etc. baked in.

steps:
  - id: reach-api
    title: Confirm the API is reachable
    instructions: steps/01-reach-api.md
    verify:
      run: curl -fs -o /dev/null http://api:8080/healthz
      successMessage: API service resolves and responds.
      failureMessage: Try `curl http://api:8080/healthz` — service DNS is `<podname>` inside the namespace.

  - id: find-bug
    title: Reproduce the failing endpoint
    instructions: steps/02-find-bug.md
    verify:
      run: curl -s http://api:8080/orders | tee /tmp/orders.json | jq -e 'type=="array"' >/dev/null

  - id: fix-sql
    title: Fix the broken view
    instructions: steps/03-fix-sql.md
    hint: steps/03-hint.md
    verify:
      pod: shell
      run: |
        PGPASSWORD=lab psql -h db -U postgres -d orders -tAc \
          "select count(*) from orders_view where total > 0" | grep -qv '^0$'
      timeout: 20s

finish:
  markdown: finish.md
