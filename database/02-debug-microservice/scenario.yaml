apiVersion: labs.handsonn.dev/v1
kind: Scenario
id: debug-microservice
title: Debug a Misbehaving API
summary: A broken API and its database. Find the bug, fix the SQL, verify the response.
difficulty: intermediate
tags: [debugging, http, sql]
duration: 30m
topic: database
issueType: debugging

session:
  ttl: 60m
  quota:
    cpu: "4"
    memory: 8Gi
    pods: 5

environment:
  type: linux
  pods:
    # netshoot ships curl, jq, dig, nc, psql, etc. baked in — our pods
    # run with a tight SecurityContext (caps dropped, no privilege
    # escalation), so we can't `apt-get install` at runtime.
    - name: shell
      image: nicolaka/netshoot:latest
      primary: true
      command: ["sleep", "infinity"]
      resources:
        cpu: "1"
        memory: 1Gi

    # The real broken service (source: services/broken-api/). On startup
    # it seeds an `orders` table + a deliberately-broken `orders_view`
    # (total = unit_price / 0), so /orders 500s until the learner fixes
    # the view in step 3. Runs its own entrypoint (non-primary pod).
    - name: api
      image: ghcr.io/hands-onn/hands-onn/broken-api:latest
      expose: [8080]
      env:
        - name: HTTP_PORT
          value: "8080"
        - name: DB_HOST
          value: db
        - name: DB_PORT
          value: "5432"
        - name: DB_PASSWORD
          value: lab
        - name: DB_NAME
          value: orders
      resources:
        cpu: "500m"
        memory: 512Mi

    - name: db
      image: postgres:15-alpine
      expose: [5432]
      # postgres' entrypoint chowns its data dir + drops to the postgres
      # user — needs these caps or it never starts under the drop-ALL
      # baseline. All three are on the gateway allowlist.
      addCapabilities: [SETUID, SETGID, CHOWN]
      env:
        - name: POSTGRES_PASSWORD
          value: lab
        - name: POSTGRES_DB
          value: orders
      resources:
        cpu: "500m"
        memory: 512Mi

  init:
    # netshoot ships curl/jq/dig but no psql — install it so the learner
    # (and step 3's verify) can reach the db. Egress to the Alpine repos
    # is allowed by the lab NetworkPolicy.
    - pod: shell
      run: apk add --no-cache postgresql-client >/dev/null 2>&1

steps:
  - id: reach-api
    title: Confirm the API is reachable
    instructions: steps/01-reach-api.md
    verify:
      run: curl -fs -o /dev/null http://api:8080/healthz
      successMessage: API service resolves and responds.
      failureMessage: Try `curl http://api:8080/healthz` — service DNS is `<podname>` inside the namespace.

  - id: find-bug
    title: Reproduce the failing endpoint
    instructions: steps/02-find-bug.md
    verify:
      run: curl -s http://api:8080/orders | tee /tmp/orders.json | jq -e 'type=="array"' >/dev/null

  - id: fix-sql
    title: Fix the broken view
    instructions: steps/03-fix-sql.md
    hint: steps/03-hint.md
    verify:
      pod: shell
      run: |
        PGPASSWORD=lab psql -h db -U postgres -d orders -tAc \
          "select count(*) from orders_view where total > 0" | grep -qv '^0$'
      timeout: 20s

finish:
  markdown: finish.md
