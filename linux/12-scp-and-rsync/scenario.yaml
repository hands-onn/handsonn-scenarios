apiVersion: labs.handsonn.dev/v1
kind: Scenario
id: scp-and-rsync
title: Copy Files Between Hosts with scp and rsync
summary: Real cross-host workflow — password bootstrap, install pubkey, then scp and rsync between two pods.
difficulty: intermediate
tags: [linux, ssh, scp, rsync]
duration: 40m
topic: linux
issueType: networking

# Two pods talking over SSH. The server runs sshd on 2222 and accepts a
# starter password so the user can bootstrap pubkey auth the way you'd
# do it on a fresh machine.
#
# The lab sandbox drops ALL Linux capabilities by default, but sshd's
# mandatory privilege separation needs SETUID/SETGID/SYS_CHROOT. The
# sshserver pod requests exactly those via `addCapabilities` (an
# allowlisted set the gateway permits). The client pod stays fully
# locked down. sshd itself is started from an init action, since the
# sandbox forces `sleep infinity` as the entrypoint.
session:
  ttl: 60m
  quota:
    cpu: "2"
    memory: 2Gi
    pods: 2

environment:
  type: linux
  pods:
    # The pod the user has a terminal on.
    - name: client
      image: nicolaka/netshoot:latest
      primary: true
      command: ["sleep", "infinity"]
      resources:
        cpu: "500m"
        memory: 512Mi

    # The SSH target. sshd is started by the init action below and needs
    # these caps: SETUID/SETGID/SYS_CHROOT for privilege separation
    # (setuid to the login user + chroot to /var/empty), and CHOWN so the
    # init script can hand /home/handsonn to the handsonn user — busybox
    # adduser can't chown it in the sandbox, so it lands root-owned.
    - name: sshserver
      image: nicolaka/netshoot:latest
      command: ["sleep", "infinity"]
      expose: [2222]
      addCapabilities: [SETUID, SETGID, SYS_CHROOT, CHOWN]
      resources:
        cpu: "500m"
        memory: 512Mi

  init:
    # Server: install + start sshd, create the handsonn user with a
    # starter password, allow password auth for the bootstrap step.
    - pod: sshserver
      run: |
        set -e
        apk add --no-cache openssh openssh-server rsync >/dev/null 2>&1
        adduser -D handsonn 2>/dev/null || true
        echo 'handsonn:labpass' | chpasswd
        ssh-keygen -A >/dev/null            # host keys
        cat > /etc/ssh/sshd_config_lab <<'EOF'
        Port 2222
        PasswordAuthentication yes
        PubkeyAuthentication yes
        PermitRootLogin no
        Subsystem sftp internal-sftp
        EOF
        # busybox adduser leaves /home/handsonn root-owned in the sandbox;
        # hand it to the user so they can create ~/.ssh in the pubkey step.
        chown handsonn:handsonn /home/handsonn
        /usr/sbin/sshd -f /etc/ssh/sshd_config_lab

    # Client: generate a keypair + sample payload, install helpers.
    - pod: client
      run: |
        set -e
        apk add --no-cache openssh-client rsync sshpass >/dev/null 2>&1
        mkdir -p /root/.ssh && chmod 700 /root/.ssh
        ssh-keygen -t ed25519 -N '' -C client -f /root/.ssh/id_ed25519 >/dev/null
        chmod 600 /root/.ssh/id_ed25519
        mkdir -p /work && for i in a b c; do echo "$i-payload" > /work/$i.txt; done

steps:
  - id: password-first
    title: First contact — password login
    instructions: steps/01-password-first.md
    hint: steps/01-hint.md
    verify:
      run: |
        sshpass -p labpass ssh \
          -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
          -o PreferredAuthentications=password -o PubkeyAuthentication=no \
          -p 2222 handsonn@sshserver 'echo ok' 2>/dev/null | grep -q ok
      timeout: 20s
      failureMessage: Password login as handsonn@sshserver (port 2222) with password "labpass" failed. Is the server pod up?

  - id: install-pubkey
    title: Install your public key on the server
    instructions: steps/02-install-pubkey.md
    hint: steps/02-hint.md
    verify:
      run: |
        ssh \
          -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
          -o PreferredAuthentications=publickey -o PasswordAuthentication=no \
          -i /root/.ssh/id_ed25519 \
          -p 2222 handsonn@sshserver 'echo ok' 2>/dev/null | grep -q ok
      timeout: 20s
      failureMessage: Pubkey auth to handsonn@sshserver failed. Ensure ~handsonn/.ssh/authorized_keys on the server contains your id_ed25519.pub and has mode 600, and .ssh is mode 700.

  - id: scp-file
    title: Copy a single file with scp
    instructions: steps/03-scp-file.md
    verify:
      run: |
        ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
          -i /root/.ssh/id_ed25519 -p 2222 handsonn@sshserver \
          'test -f /home/handsonn/a.txt && grep -q a-payload /home/handsonn/a.txt'
      timeout: 20s
      failureMessage: scp /work/a.txt to handsonn@sshserver:/home/handsonn/a.txt (port 2222).

  - id: rsync-dir
    title: Sync a directory with rsync
    instructions: steps/04-rsync-dir.md
    verify:
      run: |
        ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
          -i /root/.ssh/id_ed25519 -p 2222 handsonn@sshserver \
          'test -f /home/handsonn/work/a.txt && test -f /home/handsonn/work/b.txt && test -f /home/handsonn/work/c.txt'
      timeout: 25s
      failureMessage: rsync /work into handsonn@sshserver:/home/handsonn/ so files land in /home/handsonn/work/.

  - id: rsync-delete
    title: --delete, safely
    instructions: steps/05-rsync-delete.md
    verify:
      run: |
        ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
          -i /root/.ssh/id_ed25519 -p 2222 handsonn@sshserver \
          '! test -f /home/handsonn/work/a.txt && test -f /home/handsonn/work/b.txt'
      timeout: 25s
      failureMessage: Delete /work/a.txt locally, then rsync -a --delete /work/ to handsonn@sshserver:/home/handsonn/work/. Server-side a.txt should be gone.

finish:
  markdown: finish.md
