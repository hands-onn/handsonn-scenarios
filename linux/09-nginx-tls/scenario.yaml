apiVersion: labs.handsonn.dev/v1
kind: Scenario
id: nginx-tls
title: Terminate TLS in nginx
summary: Generate a self-signed cert and configure nginx to serve HTTPS.
difficulty: advanced
tags: [linux, nginx, tls, openssl]
duration: 30m
topic: linux
issueType: networking

session:
  ttl: 60m
  quota:
    cpu: "2"
    memory: 2Gi
    pods: 1

environment:
  type: linux
  pods:
    - name: web
      image: debian:12-slim
      primary: true
      command: ["sleep", "infinity"]
      resources:
        cpu: "1"
        memory: 512Mi
  init:
    - pod: web
      # nginx + openssl come in the same install pass.
      run: |
        apt-get update -q >/dev/null
        apt-get install -y nginx openssl >/dev/null
        mkdir -p /etc/nginx/certs

steps:
  - id: generate-cert
    title: Generate a self-signed cert
    instructions: steps/01-generate-cert.md
    hint: steps/01-hint.md
    verify:
      run: |
        test -f /etc/nginx/certs/server.crt \
          && test -f /etc/nginx/certs/server.key \
          && openssl x509 -in /etc/nginx/certs/server.crt -noout -subject | grep -q "CN\s*=\s*handsonn"
      failureMessage: server.crt and server.key must exist in /etc/nginx/certs, and the certificate CN must be "handsonn".

  - id: configure-tls
    title: Point nginx at the cert
    instructions: steps/02-configure-tls.md
    verify:
      run: |
        # Site config must reference both files and listen on 8443 ssl.
        f=/etc/nginx/sites-enabled/default
        grep -qE 'listen\s+8443\s+ssl' "$f" \
          && grep -q "ssl_certificate\s\+/etc/nginx/certs/server.crt" "$f" \
          && grep -q "ssl_certificate_key\s\+/etc/nginx/certs/server.key" "$f"
      failureMessage: Add `listen 8443 ssl;`, `ssl_certificate .../server.crt;`, and `ssl_certificate_key .../server.key;` to the server block.

  - id: verify-tls
    title: Verify with curl and openssl s_client
    instructions: steps/03-verify-tls.md
    verify:
      # Ignore untrusted-CA (self-signed) with -k; verify we actually
      # negotiate TLS by asserting a 2xx/3xx.
      run: |
        curl -sk https://127.0.0.1:8443 -o /dev/null -w '%{http_code}' | grep -E '^(2|3)[0-9]{2}$'
      timeout: 15s
      failureMessage: HTTPS on 8443 not responding. Did you `nginx -t` and start (or reload) the daemon?

finish:
  markdown: finish.md
